name: Deploy Text-to-Speech Node.js App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # === PROJECT CONFIG ===
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'text-to-speech' }}
  ARTIFACT_NAME: 'tts-app.tar.gz'
  PM2_APP_NAME: 'tts-app'

  # === SERVER CONFIG (GIỮ NGUYÊN) ===
  PROJECT_ROOT: ${{ vars.PROJECT_ROOT || '/var/www/CongDeploy/CICD' }}
  RUN_DIR: ${{ vars.RUN_DIR || format('/var/www/CongDeploy/CICD/run/{0}', vars.PROJECT_NAME || 'text-to-speech') }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER || 'gitdeploy' }}
  DEPLOY_GROUP: ${{ vars.DEPLOY_GROUP || 'nginx' }}

concurrency:
  group: deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-nodejs-app:
    runs-on: ubuntu-latest
    name: Deploy Node.js TTS Application

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --production --silent

      - name: Create application archive
        run: |
          # Tạo thư mục tạm để tránh conflict
          mkdir -p /tmp/tts-archive

          # Copy source code (loại trừ các file/folder không cần)
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env*' \
            --exclude='*.log' \
            --exclude='tmp/' \
            --exclude='logs/' \
            --exclude='.DS_Store' \
            --exclude='coverage/' \
            ./ /tmp/tts-archive/

          # Copy node_modules production
          cp -r node_modules/ /tmp/tts-archive/node_modules/

          # Tạo archive từ thư mục tạm
          cd /tmp/tts-archive
          tar -czf "/tmp/${ARTIFACT_NAME}" .

          # Move về workspace
          mv "/tmp/${ARTIFACT_NAME}" "${GITHUB_WORKSPACE}/${ARTIFACT_NAME}"

          # Cleanup
          rm -rf /tmp/tts-archive

      - name: Upload to server
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          # Upload archive
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} \
            "${ARTIFACT_NAME}" \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/${ARTIFACT_NAME}"

          # Cleanup SSH key
          rm -f ~/.ssh/deploy_key

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: PROJECT_NAME,PROJECT_ROOT,RUN_DIR,DEPLOY_USER,DEPLOY_GROUP,ARTIFACT_NAME,PM2_APP_NAME,PORT
          script: |
            set -euo pipefail

            # Set script timeout to prevent hanging (8 minutes)
            trap 'echo "❌ Deployment script timed out!"; exit 124' TERM
            (sleep 480; echo "⏰ Deployment taking too long, sending timeout signal"; kill -TERM $$) &
            TIMEOUT_PID=$!

            echo "🚀 Starting deployment for ${PROJECT_NAME}..."
            TMP_TAR="/tmp/${ARTIFACT_NAME}"

            # Set default PORT if not provided
            PORT=${PORT:-3000}
            echo "🎯 Target port: $PORT"

            # Validate artifact exists
            [ -f "$TMP_TAR" ] || {
              echo "❌ Artifact not found: $TMP_TAR" >&2; exit 1;
            }

            # Security: Validate RUN_DIR is within PROJECT_ROOT
            case "$RUN_DIR" in "$PROJECT_ROOT"/*)
              echo "✅ Deploy directory validated: $RUN_DIR"
              ;;
            *)
              echo "❌ Unsafe RUN_DIR: $RUN_DIR" >&2; exit 1
              ;;
            esac

            # Create deploy directory
            echo "📁 Creating deploy directory..."
            mkdir -p "$RUN_DIR"

            # Backup current app (optional)
            if [ -d "$RUN_DIR" ] && [ "$(ls -A $RUN_DIR 2>/dev/null)" ]; then
              echo "💾 Creating backup..."
              tar -czf "/tmp/backup-${PROJECT_NAME}-$(date +%Y%m%d-%H%M%S).tar.gz" -C "$RUN_DIR" . || true
            fi

            # Clear old deployment and extract new
            echo "🧹 Clearing old deployment..."
            find "$RUN_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

            echo "📦 Extracting new deployment..."
            tar -xzf "$TMP_TAR" -C "$RUN_DIR"

            # Set proper permissions
            echo "🔒 Setting permissions..."
            find "$RUN_DIR" -type d -exec chmod 755 {} + 2>/dev/null || true
            find "$RUN_DIR" -type f -exec chmod 644 {} + 2>/dev/null || true

            # Set group ownership for web server (if user has permission)
            if id -nG "$USER" | grep -qw "$DEPLOY_GROUP" 2>/dev/null; then
              echo "👥 Setting group ownership to $DEPLOY_GROUP..."
              chgrp -R "$DEPLOY_GROUP" "$RUN_DIR" 2>/dev/null || {
                echo "⚠️ Cannot set group ownership to $DEPLOY_GROUP (insufficient permissions)"
              }
            else
              echo "ℹ️ User $(whoami) not in group $DEPLOY_GROUP, skipping group ownership change"
            fi

            # Deploy Node.js application
            cd "$RUN_DIR"
            echo "📋 Installing dependencies..."
            npm ci --production --silent --no-audit --no-fund

            # PM2 cleanup (user-level only)
            echo "🔧 PM2 cleanup for user $(whoami)..."

            # Stop PM2 processes for current user
            echo "💥 Stopping PM2 processes for current user..."
            pm2 kill || true
            pm2 delete all || true

            # Force kill any remaining processes on port 3000 (AGGRESSIVE CLEANUP)
            echo "🔍 Checking for processes on port 3000..."

            # Method 1: lsof with timeout
            echo "📍 Step 1: lsof cleanup..."
            PORT_PIDS=$(timeout 15 lsof -ti:3000 2>/dev/null || true)
            if [ ! -z "$PORT_PIDS" ]; then
              echo "💀 Killing PIDs from lsof: $PORT_PIDS"
              echo "$PORT_PIDS" | xargs -r timeout 10 kill -9 2>/dev/null || true
            else
              echo "✅ No processes found via lsof"
            fi

            # Method 2: netstat + grep with timeout
            echo "📍 Step 2: netstat cleanup..."
            NETSTAT_PIDS=$(timeout 15 netstat -tulpn 2>/dev/null | grep ":3000 " | awk '{print $7}' | cut -d/ -f1 | grep -v "^-$" | sort -u || true)
            if [ ! -z "$NETSTAT_PIDS" ]; then
              echo "💀 Killing PIDs from netstat: $NETSTAT_PIDS"
              echo "$NETSTAT_PIDS" | xargs -r timeout 10 kill -9 2>/dev/null || true
            else
              echo "✅ No processes found via netstat"
            fi

            # Method 3: Kill specific Node.js processes with timeout
            echo "📍 Step 3: targeted kill specific processes..."
            timeout 20 pkill -f "node.*server.js" 2>/dev/null || echo "⚠️ pkill server.js timeout/failed"
            timeout 20 pkill -f "node.*3000" 2>/dev/null || echo "⚠️ pkill 3000 timeout/failed"
            timeout 20 pkill -f "PM2" 2>/dev/null || echo "⚠️ pkill PM2 timeout/failed"

            echo "📍 Step 4: checking if nuclear option needed..."
            # Only use nuclear option if others failed and port still occupied
            if timeout 10 lsof -i:3000 >/dev/null 2>&1; then
              echo "💀 Nuclear option: killing all user node processes..."
              timeout 20 pkill -9 -u $(whoami) node 2>/dev/null || echo "⚠️ Nuclear option timeout/failed"
            else
              echo "✅ Port 3000 freed, skipping nuclear option"
            fi

            echo "📍 Step 5: final wait..."
            sleep 2

            # Wait for port to be completely free
            sleep 3

            # Verify port is free and try fallback if needed
            if lsof -i:3000 >/dev/null 2>&1; then
              echo "⚠️ Port 3000 still in use after aggressive cleanup!"
              echo "🔍 What's still using port 3000:"
              lsof -i:3000 || true
              netstat -tulpn | grep :3000 || true

              # Try fallback ports
              for FALLBACK_PORT in 3001 3002 3003; do
                if ! lsof -i:$FALLBACK_PORT >/dev/null 2>&1; then
                  echo "✅ Using fallback port $FALLBACK_PORT"
                  export PORT=$FALLBACK_PORT
                  break
                fi
              done

              # If no fallback port found, exit
              if [ -z "$PORT" ] || [ "$PORT" = "3000" ]; then
                echo "❌ No available ports found (3000-3003 all in use)!"
                exit 1
              fi
            else
              echo "✅ Port 3000 is now free"
              export PORT=3000
            fi

            echo "🎯 Will use port: $PORT"

            # Initialize PM2 for this user
            echo "🚀 Initializing fresh PM2 environment for $(whoami)..."
            pm2 kill || true
            pm2 startup || true

            # Verify no PM2 processes running
            if pm2 list | grep -q "online\|error"; then
              echo "❌ Found running PM2 processes, cleaning again..."
              pm2 delete all || true
              pm2 kill || true
              sleep 2
            fi

            # Start with ecosystem configuration
            echo "🚀 Starting $PM2_APP_NAME with ecosystem config on port $PORT..."

            # Create logs directory
            mkdir -p logs

            # Start using ecosystem file for consistent configuration
            PORT=$PORT pm2 start ecosystem.config.js

            # Save configuration
            pm2 save

            # Verify startup - wait longer for Node.js to initialize
            echo "⏳ Waiting for application to start..."
            sleep 10

            # Check multiple times to ensure stability
            for i in {1..3}; do
              echo "🔍 Startup check $i/3..."
              if pm2 list | grep "$PM2_APP_NAME" | grep -q "online"; then
                echo "✅ PM2 app '$PM2_APP_NAME' is online (check $i)"
                break
              elif [ $i -eq 3 ]; then
                echo "❌ PM2 startup failed after 3 checks!"
                pm2 list
                pm2 logs "$PM2_APP_NAME" --lines 30
                exit 1
              else
                echo "⏳ App not ready yet, waiting..."
                sleep 5
              fi
            done

            # Final verification
            echo "🔍 Final application status:"
            pm2 show "$PM2_APP_NAME" || echo "Cannot show PM2 details"

            # Show PM2 status
            pm2 list | grep "$PM2_APP_NAME" || echo "⚠️  PM2 status check failed"

            # Cleanup
            echo "🧹 Cleaning up..."
            rm -f "$TMP_TAR"

            # Kill timeout process
            kill $TIMEOUT_PID 2>/dev/null || true

            echo "🎉 Deployment completed successfully!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: PM2_APP_NAME,PORT
          script: |
            # Wait a moment for app to start
            sleep 5

            # Check PM2 process status
            if pm2 list | grep "$PM2_APP_NAME" | grep -q "online"; then
              echo "✅ Application is running successfully"
              pm2 show "$PM2_APP_NAME" | head -10
            else
              echo "❌ Application failed to start"
              pm2 logs "$PM2_APP_NAME" --lines 10 || true
              exit 1
            fi

            # Test endpoints
            echo "🧪 Testing API endpoints..."

            # Determine the port to test (default to 3000 if not set)
            TEST_PORT=${PORT:-3000}
            echo "🎯 Testing on port: $TEST_PORT"

            # Test regular endpoint
            if curl -s -f http://localhost:$TEST_PORT/api/tts/generate > /dev/null; then
              echo "✅ Regular TTS endpoint working on port $TEST_PORT"
            else
              echo "⚠️  Regular TTS endpoint failed on port $TEST_PORT"
            fi

            # Test long text endpoint (the one that was failing)
            if curl -s -f -X POST http://localhost:$TEST_PORT/api/tts/generate-long \
              -H "Content-Type: application/json" \
              -d '{"text":"CI/CD test","language":"en-US","voice":"en-US-AriaNeural","voiceName":"Aria","gender":"female"}' > /dev/null; then
              echo "✅ Long text TTS endpoint working on port $TEST_PORT"
            else
              echo "❌ Long text TTS endpoint failed on port $TEST_PORT"
              echo "📋 Recent logs:"
              pm2 logs "$PM2_APP_NAME" --lines 5 || true
            fi