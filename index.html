<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Text to Speech - A Speech service feature that converts text to lifelike speech</title>
    <meta name="description" content="Free text-to-speech service with multiple languages and voices. Convert text to natural-sounding speech with male and female voice options.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-mode">
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <!-- Logo -->
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-microphone-alt"></i>
                    </div>
                    <div class="logo-text">
                        <h1>Free text to speech</h1>
                        <p>A Speech service feature that converts text to lifelike speech</p>
                    </div>
                </div>

                <!-- Navigation -->
                <nav class="nav">
                    <a href="#" class="nav-link active">Home</a>
                    <a href="#" class="nav-link">Tutorial</a>
                    <a href="#" class="nav-link">Donate</a>
                    <a href="#" class="nav-link">Support</a>
                </nav>

                <!-- Controls -->
                <div class="header-controls">
                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <select id="ui-language" class="ui-language">
                        <option value="en">English</option>
                        <option value="vi">Tiếng Việt</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="content-grid">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <!-- Voice Language -->
                    <div class="control-group">
                        <label for="voice-language" class="control-label">Voice Language</label>
                        <select id="voice-language" class="control-select">
                            <option value="en-US">English (United States)</option>
                            <option value="en-GB">English (United Kingdom)</option>
                            <option value="en-AU">English (Australia)</option>
                            <option value="vi-VN">Tiếng Việt (Vietnam)</option>
                            <option value="es-ES">Español (España)</option>
                            <option value="es-MX">Español (México)</option>
                            <option value="fr-FR">Français (France)</option>
                            <option value="fr-CA">Français (Canada)</option>
                            <option value="de-DE">Deutsch (Deutschland)</option>
                            <option value="it-IT">Italiano (Italia)</option>
                            <option value="pt-BR">Português (Brasil)</option>
                            <option value="pt-PT">Português (Portugal)</option>
                            <option value="ru-RU">Русский (Россия)</option>
                            <option value="ja-JP">日本語 (日本)</option>
                            <option value="ko-KR">한국어 (대한민국)</option>
                            <option value="zh-CN">中文 (中国)</option>
                            <option value="zh-TW">中文 (台灣)</option>
                            <option value="ar-SA">العربية (السعودية)</option>
                            <option value="hi-IN">हिन्दी (भारत)</option>
                            <option value="th-TH">ไทย (ประเทศไทย)</option>
                            <option value="nl-NL">Nederlands (Nederland)</option>
                            <option value="sv-SE">Svenska (Sverige)</option>
                            <option value="da-DK">Dansk (Danmark)</option>
                            <option value="no-NO">Norsk (Norge)</option>
                            <option value="fi-FI">Suomi (Suomi)</option>
                            <option value="pl-PL">Polski (Polska)</option>
                            <option value="cs-CZ">Čeština (Česká republika)</option>
                            <option value="sk-SK">Slovenčina (Slovensko)</option>
                            <option value="hu-HU">Magyar (Magyarország)</option>
                            <option value="ro-RO">Română (România)</option>
                            <option value="bg-BG">Български (България)</option>
                            <option value="hr-HR">Hrvatski (Hrvatska)</option>
                            <option value="sl-SI">Slovenščina (Slovenija)</option>
                            <option value="et-EE">Eesti (Eesti)</option>
                            <option value="lv-LV">Latviešu (Latvija)</option>
                            <option value="lt-LT">Lietuvių (Lietuva)</option>
                            <option value="mt-MT">Malti (Malta)</option>
                            <option value="tr-TR">Türkçe (Türkiye)</option>
                            <option value="he-IL">עברית (ישראל)</option>
                            <option value="fa-IR">فارسی (ایران)</option>
                            <option value="ur-PK">اردو (پاکستان)</option>
                            <option value="bn-BD">বাংলা (বাংলাদেশ)</option>
                            <option value="ta-IN">தமிழ் (இந்தியா)</option>
                            <option value="te-IN">తెలుగు (భారతదేశం)</option>
                            <option value="ml-IN">മലയാളം (ഇന്ത്യ)</option>
                            <option value="kn-IN">ಕನ್ನಡ (ಭಾರತ)</option>
                            <option value="gu-IN">ગુજરાતી (ભારત)</option>
                            <option value="mr-IN">मराठी (भारत)</option>
                            <option value="pa-IN">ਪੰਜਾਬੀ (ਭਾਰਤ)</option>
                        </select>
                    </div>

                    <!-- Gender Filter -->
                    <div class="control-group">
                        <label class="control-label">Gender</label>
                        <div class="gender-buttons">
                            <button class="gender-btn active" data-gender="all">All</button>
                            <button class="gender-btn" data-gender="male">Male</button>
                            <button class="gender-btn" data-gender="female">Female</button>
                        </div>
                    </div>

                    <!-- Voice Search -->
                    <div class="control-group">
                        <label for="voice-search" class="control-label">Voice Search</label>
                        <input type="text" id="voice-search" class="voice-search" placeholder="Search by voice name">
                    </div>

                    <!-- Voice List -->
                    <div class="voice-list" id="voice-list">
                        <div class="voice-loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span>Loading voices...</span>
                        </div>
                    </div>

                    <!-- Speed Control -->
                    <div class="control-group">
                        <div class="slider-header">
                            <label class="control-label">
                                <i class="fas fa-tachometer-alt"></i>
                                Speed
                            </label>
                            <span class="slider-value" id="speed-value">0%</span>
                        </div>
                        <input type="range" id="speed-range" class="control-slider" min="-50" max="50" value="0">
                    </div>

                    <!-- Pitch Control -->
                    <div class="control-group">
                        <div class="slider-header">
                            <label class="control-label">
                                <i class="fas fa-wave-square"></i>
                                Pitch
                            </label>
                            <span class="slider-value" id="pitch-value">0%</span>
                        </div>
                        <input type="range" id="pitch-range" class="control-slider" min="-50" max="50" value="0">
                    </div>

                    <!-- Autoplay -->
                    <div class="control-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="autoplay" checked>
                            <span class="checkmark"></span>
                            Autoplay after generation
                        </label>
                    </div>
                </aside>

                <!-- Main Content Area -->
                <div class="main-content">
                    <!-- Input Section -->
                    <div class="input-section">
                        <div class="input-header">
                            <label for="text-input" class="input-label">Input Text</label>
                            <div class="input-info">
                                <span id="char-count" class="char-count">0 characters (0 lines)</span>
                                <button id="import-file" class="import-btn">
                                    <i class="fas fa-file-import"></i>
                                    Import File
                                </button>
                            </div>
                        </div>
                        <textarea
                            id="text-input"
                            class="text-input"
                            placeholder="Enter your text here..."
                            maxlength="5000"
                        ></textarea>
                    </div>

                    <!-- Error/Status Messages -->
                    <div id="message-area" class="message-area hidden">
                        <div class="message-content">
                            <i class="message-icon"></i>
                            <span class="message-text"></span>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button id="preview-btn" class="btn btn-secondary" disabled>
                            <i class="fas fa-play"></i>
                            Preview Audio
                        </button>
                        <button id="generate-btn" class="btn btn-primary" disabled>
                            <i class="fas fa-bolt"></i>
                            Generate Audio
                        </button>
                    </div>

                    <!-- Results Section -->
                    <div id="results-section" class="results-section hidden">
                        <h3 class="results-title">Results</h3>
                        <div class="audio-player-container">
                            <audio id="audio-player" class="audio-player" controls preload="none">
                                Your browser does not support the audio player.
                            </audio>
                            <button id="download-btn" class="btn btn-download">
                                <i class="fas fa-download"></i>
                                Download MP3
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Hidden file input for import -->
    <input type="file" id="file-input" accept=".txt,.doc,.docx" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
